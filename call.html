
<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Active Call - MoodLog</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    (function () {
      try {
        window.__VIBE_SILENCE_CONSOLE__ = false;
      } catch { }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#33bfcc",
            "background-light": "#f2f2f3",
            "background-dark": "#121417",
            "surface-dark": "#1e2124",
            "accent-red": "#ef4444",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .active-speaker {
      box-shadow: 0 0 0 3px #33bfcc, 0 0 15px rgba(51, 191, 204, 0.4) !important;
      border-color: #33bfcc !important;
    }

    body {
      font-family: 'Manrope', sans-serif;
      overscroll-behavior: none;
    }

    .video-tile {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: none;
      background: #000;
      overflow: hidden;
      border-radius: 1rem;
    }

    .video-container {
      position: absolute;
      inset: 0;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: opacity;
    }

    video.self-view {
      transform: scaleX(1) !important;
      -webkit-transform: scaleX(1) !important;
      -moz-transform: scaleX(1) !important;
    }

    video.remote-view {
      transform: scaleX(-1) !important;
      -webkit-transform: scaleX(-1) !important;
      -moz-transform: scaleX(-1) !important;
    }

    .video-enhanced {
      filter: brightness(1.03) contrast(1.04) saturate(1.08);
      -webkit-filter: brightness(1.03) contrast(1.04) saturate(1.08);
    }

    .pfp-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .participant-grid {
      display: grid;
      grid-template-columns: 1fr;
      justify-content: stretch;
      align-items: start;
      align-content: stretch;
      gap: 1rem;
      width: 100%;
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      min-height: 0;
      grid-auto-rows: 1fr;
    }

    /* Zoom-like fit-to-screen layouts (no scrolling) */
    .participant-grid[data-count="1"] {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .participant-grid[data-count="2"] {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: 1fr;
    }

    .participant-grid[data-count="3"] {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      grid-template-areas:
        "p1 p1"
        "p2 p3";
    }

    .participant-grid[data-count="3"] .video-tile:nth-child(1) {
      grid-area: p1;
    }

    .participant-grid[data-count="3"] .video-tile:nth-child(2) {
      grid-area: p2;
    }

    .participant-grid[data-count="3"] .video-tile:nth-child(3) {
      grid-area: p3;
    }

    .participant-grid[data-count="4"] {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      grid-template-areas:
        "p1 p2"
        "p3 p4";
    }

    .participant-grid[data-count="4"] .video-tile:nth-child(1) {
      grid-area: p1;
    }

    .participant-grid[data-count="4"] .video-tile:nth-child(2) {
      grid-area: p2;
    }

    .participant-grid[data-count="4"] .video-tile:nth-child(3) {
      grid-area: p3;
    }

    .participant-grid[data-count="4"] .video-tile:nth-child(4) {
      grid-area: p4;
    }

    .participant-grid[data-count="5"],
    .participant-grid[data-count="6"] {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .participant-grid[data-count="7"],
    .participant-grid[data-count="8"],
    .participant-grid[data-count="9"] {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    .participant-grid[data-count="10"],
    .participant-grid[data-count="11"],
    .participant-grid[data-count="12"] {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    @media (min-width: 1024px) {
      .participant-grid {
        max-width: 1800px;
      }
    }

    @media (max-width: 640px) {
      .participant-grid {
        padding: 0.5rem;
        gap: 0.5rem;
        max-width: 100%;
      }

      .video-tile {
        max-width: 100%;
        border-radius: 0.85rem;
      }

      .participant-grid[data-count="1"] {
        grid-template-columns: 1fr;
      }

      .participant-grid[data-count="2"] {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(2, 1fr);
      }

      .participant-grid[data-count="3"],
      .participant-grid[data-count="4"] {
        grid-template-columns: repeat(2, 1fr);
      }

      .participant-grid[data-count="5"],
      .participant-grid[data-count="6"] {
        grid-template-columns: repeat(3, 1fr);
      }

      .participant-grid[data-count="7"],
      .participant-grid[data-count="8"],
      .participant-grid[data-count="9"] {
        grid-template-columns: repeat(3, 1fr);
      }
    }


    #chatContainer {
      animation: slideInFromBottom 0.3s ease-out;
    }

    @keyframes slideInFromBottom {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    #miniCallIndicator {
      animation: slideInFromRight 0.3s ease-out;
    }

    @keyframes slideInFromRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes bounce-slow {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-bounce-slow {
      animation: bounce-slow 2s ease-in-out infinite;
    }

    /* ✅ Zero-flicker layout hiding */
    header,
    main,
    footer {
      visibility: hidden;
    }

    /* ✅ Control Lockout Animation */
    .controls-locked {
      pointer-events: none !important;
      opacity: 0.6 !important;
      cursor: not-allowed !important;
    }

    .controls-locked span {
      animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse-ring {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.9);
      }
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white h-screen flex flex-col font-display overflow-hidden">
  <header
    class="w-full border-b border-slate-200 dark:border-slate-800 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between bg-background-light dark:bg-background-dark z-10">
    <div class="flex items-center gap-3 sm:gap-4 flex-1 min-w-0">
      <div class="bg-primary/20 p-1.5 sm:p-2 rounded-lg flex-shrink-0">
        <span class="material-symbols-outlined text-primary text-lg sm:text-2xl" id="callIcon">videocam</span>
      </div>
      <div class="min-w-0">
        <h1 class="text-sm sm:text-lg font-bold tracking-tight truncate" id="callTitle">Video Call</h1>
        <p class="text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 truncate" id="callSubtitle">Connecting...
        </p>
      </div>
    </div>
    <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
      <div
        class="flex items-center gap-1.5 sm:gap-2 bg-slate-200 dark:bg-surface-dark px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-slate-300 dark:border-slate-700 min-w-0">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
        </span>
      </div>
    </div>
  </header>

  <!-- ✅ Professional Loading Overlay -->
  <div id="callLoadingOverlay"
    class="fixed inset-0 z-[50] bg-background-light dark:bg-background-dark flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="relative mb-8">
      <div class="w-20 h-20 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-3xl animate-pulse">videocam</span>
      </div>
    </div>
    <h2 class="text-xl font-bold mb-2 tracking-tight" id="loadingStatusText">Initializing Connection</h2>
    <p class="text-slate-500 dark:text-slate-400 text-sm animate-pulse" id="loadingSubtext">Setting up your media
      devices...</p>

    <div class="mt-12 flex items-center gap-4 px-6 py-3 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10">
      <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
      <span class="text-xs text-slate-500 dark:text-slate-400">Secure Encrypted Connection</span>
    </div>
  </div>

  <!-- UI-only Reconnection Overlay (shown during reconnect attempts) -->
  <div id="callReconnectOverlay"
    class="fixed inset-0 z-[55] hidden bg-background-light/90 dark:bg-background-dark/90 flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="relative mb-8">
      <div class="w-20 h-20 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="material-symbols-outlined text-amber-400 text-3xl animate-pulse">wifi_off</span>
      </div>
    </div>
    <h2 class="text-xl font-bold mb-2 tracking-tight" id="reconnectStatusText">Reconnecting</h2>
    <p class="text-slate-500 dark:text-slate-400 text-sm animate-pulse" id="reconnectSubtext">Restoring your secure connection...</p>

    <div class="mt-12 flex items-center gap-4 px-6 py-3 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10">
      <div class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
      <span class="text-xs text-slate-500 dark:text-slate-400">Attempting to resume in-call signaling</span>
    </div>
  </div>

  <main class="flex-1 min-h-0 overflow-hidden">
    <div id="participantGrid" class="participant-grid"></div>
  </main>

  <footer class="w-full px-3 sm:px-6 py-3 sm:py-4 flex justify-center sticky bottom-0 z-20">
    <div
      class="bg-white/95 dark:bg-surface-dark/95 backdrop-blur-lg shadow-2xl rounded-xl sm:rounded-2xl border border-slate-200 dark:border-slate-800 p-2 sm:p-2.5 flex items-center gap-1 sm:gap-2">
      <div class="flex items-center gap-1 sm:gap-2 px-1 sm:px-2 border-r border-slate-200 dark:border-slate-800">
        <button id="micBtn"
          class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-lg sm:rounded-xl bg-primary text-white hover:brightness-110 transition-all active:scale-95">
          <span class="material-symbols-outlined text-lg sm:text-2xl">mic</span>
        </button>
        <button id="videoBtn"
          class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-lg sm:rounded-xl bg-slate-200 dark:bg-background-dark text-slate-700 dark:text-white hover:bg-slate-300 dark:hover:bg-slate-800 transition-all">
          <span class="material-symbols-outlined text-lg sm:text-2xl">videocam_off</span>
        </button>
        <button id="flipCamBtn" disabled
          class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-lg sm:rounded-xl bg-slate-200 dark:bg-background-dark text-slate-700 dark:text-white hover:bg-slate-300 dark:hover:bg-slate-800 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-lg sm:text-2xl">cameraswitch</span>
        </button>
      </div>

      <div class="pl-1 sm:pl-2">
        <button id="leaveCallBtn"
          class="flex items-center gap-1.5 sm:gap-2 px-4 sm:px-6 h-10 sm:h-12 rounded-lg sm:rounded-xl bg-accent-red text-white hover:brightness-110 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined font-bold text-lg sm:text-2xl">call_end</span>
          <span class="font-bold text-xs sm:text-sm">Leave</span>
        </button>
      </div>
    </div>
  </footer>

  <div id="chatOverlayContainer" class="hidden fixed inset-0 z-[9999] bg-white">
    <iframe id="chatOverlayIframe" class="w-full h-full border-none"></iframe>
  </div>

  <!-- Mini Call Indicator -->
  <!-- <button id="miniCallIndicator" class="hidden fixed bottom-20 right-4 z-[10000] bg-green-600 hover:bg-green-700 active:bg-green-800 text-white rounded-full p-4 shadow-2xl transition-all hover:scale-110 active:scale-95">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-2xl">call</span>
        <span class="text-sm font-bold">Back to Call</span>
    </div>
</button> -->

  <script src="/env-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="app.js"></script>



  <script src="call.js"></script>
</body>

</html>
