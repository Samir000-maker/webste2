

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Chat Room - MoodLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function () {
      try {
        window.__VIBE_SILENCE_CONSOLE__ = false;
      } catch { }
    })();
  </script>
  <link href="global.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #0a0e14;
    }

    .reply-btn {
      opacity: 0;
      transition: opacity 0.15s ease;
      cursor: pointer;
    }

    .message-item:hover .reply-btn {
      opacity: 1;
    }

    .reply-preview {
      animation: slideUp 0.15s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .quoted-message {
      border-left: 3px solid #06b6d4;
      padding-left: 8px;
      margin-bottom: 6px;
      background-color: rgba(6, 182, 212, 0.1);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.813rem;
    }

    .quoted-message-light {
      background-color: rgba(6, 182, 212, 0.08);
      border-left-color: #06b6d4;
    }

    .sidebar {
      transition: transform 0.2s ease;
      background-color: #161b22;
    }

    .main-container {
      height: 100vh;
      height: 100dvh;
    }

    .call-buttons-container {
      position: relative;
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 640px) {
      .call-buttons-container {
        gap: 6px;
      }
    }

    .chat-main {
      max-height: calc(100vh - 64px);
      max-height: calc(100dvh - 64px);
      background-color: #0d1117;
    }

    @media (max-width: 768px) {
      .chat-main {
        max-height: calc(100vh - 56px);
        max-height: calc(100dvh - 56px);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 280px;
        z-index: 40;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
        transform: translateX(-100%);
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 30;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }

    @media (min-width: 769px) {
      .sidebar {
        position: relative;
        width: 280px;
        min-width: 280px;
        display: block !important;
      }

      .sidebar-toggle {
        display: none;
      }

      .sidebar-overlay {
        display: none;
      }
    }

    .user-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      background-color: transparent;
    }

    .user-card:hover {
      transform: translateY(-2px);
      background-color: rgba(6, 182, 212, 0.05) !important;
    }

    /* Message input styling */
    #messageInput {
      background-color: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }

    #messageInput::placeholder {
      color: #8b949e;
    }

    #messageInput:focus {
      border-color: #06b6d4;
      background-color: #0d1117;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      outline: none;
    }

    /* Reply preview styling */
    #replyPreview {
      background-color: #161b22;
      border-bottom: 1px solid #30363d;
      border-left: 3px solid #06b6d4;
    }

    /* Confirmation dialog dark mode */
    .confirmation-dialog {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border: 1px solid #30363d;
    }

    /* Add emoji picker button styling */
    .emoji-btn {
      background-color: #1c2128;
      border: 1px solid #30363d;
      color: #8b949e;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .emoji-btn:hover {
      background-color: #21262d;
      border-color: #444c56;
    }

    .attachment-btn {
      background-color: #1c2128;
      border: 1px solid #30363d;
      color: #8b949e;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .attachment-btn:hover {
      background-color: #21262d;
      border-color: #444c56;
    }

    /* Header styling */
    header {
      background-color: #161b22 !important;
      border-bottom: 1px solid #30363d !important;
    }

    /* Timer display */
    .hidden.sm\:flex.items-center.gap-2 {
      background-color: #1c2128 !important;
      border: 1px solid #30363d !important;
    }

    /* Call buttons - brighter cyan with glow */
    #audioCallBtn,
    #videoCallBtn {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
      border: 1px solid #22d3ee;
    }

    #audioCallBtn.call-ready,
    #videoCallBtn.call-ready {
      opacity: 1 !important;
      cursor: pointer !important;
      filter: none !important;
      pointer-events: auto;
      transform: translateZ(0);
    }

    #audioCallBtn:disabled,
    #videoCallBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #audioCallBtn:hover,
    #videoCallBtn:hover {
      background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
    }

    #joinCallBtn {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
      border: 1px solid #22d3ee;
    }

    #joinCallBtn:hover {
      background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
    }

    /* Send button - bright cyan gradient */
    button[type="submit"] {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
      border: 1px solid #22d3ee;
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
    }

    /* Message bubbles */
    .bg-\[\#2a2d33\] {
      background-color: #1c2128 !important;
      border: 1px solid #30363d;
    }

    /* User's own messages - teal/cyan with glow */
    .bg-\[\#33bfcc\] {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%) !important;
      border: 1px solid #22d3ee;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
    }

    /* System messages */
    .text-center.text-xs,
    .text-center.text-sm {
      color: #8b949e !important;
    }

    /* Message text colors */
    .text-gray-200 {
      color: #c9d1d9 !important;
    }

    .text-gray-400 {
      color: #8b949e !important;
    }

    .text-gray-500 {
      color: #6e7681 !important;
    }

    /* Input bottom bar */
    .border-t.border-gray-800.bg-\[\#1f2228\] {
      background-color: #0d1117 !important;
      border-top: 1px solid #30363d !important;
    }

    /* Messages list background */
    #messagesList {
      background-color: #0d1117;
    }

    /* Sidebar background */
    .bg-\[\#22252a\] {
      background-color: #161b22 !important;
    }

    /* Leave button */
    #leaveBtn {
      color: #8b949e;
    }

    #leaveBtn:hover {
      color: #c9d1d9;
    }

    /* Online count text */
    #onlineCount {
      color: #8b949e;
    }

    /* Header title */
    header h2 {
      color: #f0f6fc;
    }

    /* Decline call button in modal */
    #declineCallBtn:hover {
      background: linear-gradient(135deg, #ef4444 0%, #f87171 100%) !important;
      box-shadow: 0 0 25px rgba(239, 68, 68, 0.5) !important;
    }

    /* Accept call button in modal */
    #acceptCallBtn:hover {
      background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%) !important;
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.6) !important;
    }

    /* Loading states */
    .call-btn-loading,
    .join-btn-loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .call-btn-loading .material-symbols-outlined,
    .join-btn-loading .material-symbols-outlined {
      animation: spin 1s linear infinite;
    }

    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Reply preview close button */
    #cancelReply {
      color: #8b949e;
    }

    #cancelReply:hover {
      color: #c9d1d9;
    }

    /* Sidebar close button */
    #sidebarClose {
      color: #8b949e;
    }

    #sidebarClose:hover {
      background-color: rgba(6, 182, 212, 0.05);
    }

    /* Sidebar toggle button */
    #sidebarToggle {
      color: #8b949e;
    }

    #sidebarToggle:hover {
      background-color: rgba(6, 182, 212, 0.05);
    }

    /* Active users section */
    .text-gray-400.uppercase {
      color: #8b949e !important;
    }

    /* Green online indicator */
    .bg-green-500 {
      background-color: #22c55e !important;
    }

    /* Material icons color adjustments */
    .material-symbols-outlined {
      color: #8b949e;
    }

    button .material-symbols-outlined {
      color: inherit;
    }

    /* Scrollbar styling */
    #messagesList::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar {
      width: 8px;
    }

    #messagesList::-webkit-scrollbar-track,
    .sidebar::-webkit-scrollbar-track {
      background: #0d1117;
    }

    #messagesList::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    #messagesList::-webkit-scrollbar-thumb:hover,
    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #444c56;
    }

    /* Fade in animation for messages */
    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fade-in-up 0.3s ease-out;
    }

    /* Modal fade in */
    @keyframes fade-in {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.2s ease-out;
    }

    /* Profile picture borders */
    .border-white {
      border-color: #30363d !important;
    }

    /* Time remaining text */
    #timeRemaining {
      color: #c9d1d9;
    }

    /* User status in sidebar */
    .user-card .text-gray-500 {
      color: #8b949e !important;
    }

    .user-card .text-sm {
      color: #c9d1d9 !important;
    }

    /* ============================================
   ATTACHMENT PREVIEW STYLES
   ============================================ */
    .attachment-preview-container {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.08) 0%, rgba(14, 116, 144, 0.12) 100%);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      animation: slideUpFade 0.2s ease-out;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .attachment-preview-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .attachment-icon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .attachment-icon-wrapper.image-preview {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .attachment-icon-wrapper.pdf-preview {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .attachment-icon-wrapper.video-preview {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    .attachment-icon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .attachment-icon-wrapper .material-symbols-outlined {
      font-size: 24px;
      color: white;
    }

    .attachment-info {
      flex: 1;
      min-width: 0;
    }

    .attachment-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-size {
      font-size: 0.75rem;
      color: #8b949e;
    }

    .attachment-remove-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .attachment-remove-btn:hover {
      background-color: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .attachment-remove-btn .material-symbols-outlined {
      font-size: 18px;
      color: #ef4444;
    }

    /* Message attachment display */
    .message-attachment {
      margin-top: 8px;
      border-radius: 8px;
      overflow: hidden;
      max-width: 300px;
    }

    .message-attachment img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .message-attachment img:hover {
      opacity: 0.9;
    }

    .message-attachment-file {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .message-attachment-file:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .message-attachment-file .material-symbols-outlined {
      font-size: 24px;
    }

    .message-attachment-file.pdf {
      color: #ef4444;
    }

    .message-attachment-file.video {
      color: #a855f7;
    }

    .message-attachment-info {
      flex: 1;
      min-width: 0;
    }

    .message-attachment-name {
      font-size: 0.813rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message-attachment-size {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    /* Typing Indicator Styles */
    .typing-indicator-container {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      margin-bottom: 4px;
      animation: slideInUp 0.2s ease-out;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background-color: #33bfcc;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(51, 191, 204, 0.4);
      animation: typing-bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typing-bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
        opacity: 0.3;
      }

      40% {
        transform: scale(1.0);
        opacity: 1;
      }
    }

    @keyframes slideInUp {
      from {
        transform: translateY(10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }


    /* ============================================
   EMOJI PICKER BOTTOM SHEET - FUTURISTIC THEME
   ============================================ */

    /* Overlay backdrop */
    .emoji-picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .emoji-picker-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Bottom sheet container */
    .emoji-picker-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 70vh;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border: 1px solid #30363d;
      box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.6), 0 0 1px rgba(6, 182, 212, 0.3);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .emoji-picker-overlay.active .emoji-picker-sheet {
      transform: translateY(0);
    }

    /* Handle bar */
    .emoji-picker-handle {
      width: 40px;
      height: 4px;
      background: #30363d;
      border-radius: 2px;
      margin: 12px auto 8px;
      flex-shrink: 0;
    }

    /* Header */
    .emoji-picker-header {
      padding: 0 20px 16px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .emoji-picker-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 12px;
      text-align: center;
    }

    /* Search input */
    .emoji-search-input {
      width: 100%;
      padding: 12px 16px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 12px;
      color: #c9d1d9;
      font-size: 0.875rem;
      transition: all 0.15s ease;
    }

    .emoji-search-input::placeholder {
      color: #8b949e;
    }

    .emoji-search-input:focus {
      outline: none;
      border-color: #06b6d4;
      background: #0d1117;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    /* Category tabs */
    .emoji-categories {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      overflow-x: auto;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .emoji-categories::-webkit-scrollbar {
      display: none;
    }

    .emoji-category-tab {
      padding: 8px 16px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #8b949e;
      font-size: 0.813rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: capitalize;
    }

    .emoji-category-tab:hover {
      background: #21262d;
      border-color: #444c56;
    }

    .emoji-category-tab.active {
      background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      border-color: #22d3ee;
      color: white;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }

    /* Emoji grid container */
    .emoji-grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 24px;
      min-height: 0;
    }

    .emoji-grid-container::-webkit-scrollbar {
      width: 8px;
    }

    .emoji-grid-container::-webkit-scrollbar-track {
      background: #0d1117;
    }

    .emoji-grid-container::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .emoji-grid-container::-webkit-scrollbar-thumb:hover {
      background: #444c56;
    }

    /* Emoji grid */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 8px;
      animation: fadeInUp 0.3s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Emoji item */
    .emoji-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 1.75rem;
      user-select: none;
    }

    .emoji-item:hover {
      background: #21262d;
      border-color: #06b6d4;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
      transform: scale(1.1);
    }

    .emoji-item:active {
      transform: scale(0.95);
    }

    /* Loading state */
    .emoji-loading {
      text-align: center;
      padding: 40px 20px;
      color: #8b949e;
      font-size: 0.875rem;
    }

    .emoji-loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #30363d;
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error state */
    .emoji-error {
      text-align: center;
      padding: 40px 20px;
      color: #ef4444;
      font-size: 0.875rem;
    }

    /* Empty state */
    .emoji-empty {
      text-align: center;
      padding: 40px 20px;
      color: #8b949e;
      font-size: 0.875rem;
    }

    /* Mobile adjustments */
    @media (max-width: 640px) {
      .emoji-picker-sheet {
        max-height: 75vh;
      }

      .emoji-grid {
        grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
        gap: 6px;
      }

      .emoji-item {
        font-size: 1.5rem;
      }

      .emoji-categories {
        padding: 12px 16px;
      }

      .emoji-grid-container {
        padding: 12px 16px 20px;
      }
    }


    .image-viewer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      z-index: 10000;
      /* Make sure this is higher than other elements */
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .image-viewer-overlay.active {
      display: flex !important;
      /* Force display */
      opacity: 1;
    }

    .image-viewer-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 20px;
    }

    .image-viewer-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease;
      cursor: zoom-in;
    }

    .image-viewer-image.zoomed {
      cursor: zoom-out;
      transform: scale(1.5);
    }

    .image-viewer-close {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 10001;
    }

    .image-viewer-close:hover {
      background: rgba(33, 38, 45, 0.95);
      border-color: rgba(68, 76, 86, 0.9);
      transform: scale(1.1);
    }

    .image-viewer-close .material-symbols-outlined {
      font-size: 24px;
      color: #f0f6fc;
    }

    .image-viewer-info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 12px;
      padding: 12px 20px;
      max-width: 90%;
      text-align: center;
    }

    .image-viewer-filename {
      color: #f0f6fc;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .image-viewer-size {
      color: #8b949e;
      font-size: 12px;
    }
  </style>
